<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pedigree Sprint</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand" aria-label="Pedigree Sprint">
          <div class="brand-mark" aria-hidden="true">
            <span class="mini-person mini-circle"></span>
            <span class="mini-line"></span>
            <span class="mini-person mini-square"></span>
          </div>
          <div class="brand-copy">
            <strong>Pedigree Sprint</strong>
            <span id="diagramStats">0 people</span>
          </div>
        </div>

        <div class="toolbar" aria-label="Drawing tools">
          <button class="tool-button square-button" id="selectTool" title="Select / box select (V)" aria-label="Select / box select">
            <span aria-hidden="true">↖</span>
          </button>
          <button class="tool-button shape-tool" data-shape="female" title="Female / circle (F)" aria-label="Female / circle">
            <span class="person-icon female-icon" aria-hidden="true"></span>
            <kbd>F</kbd>
          </button>
          <button class="tool-button shape-tool" data-shape="male" title="Male / square (M)" aria-label="Male / square">
            <span class="person-icon male-icon" aria-hidden="true"></span>
            <kbd>M</kbd>
          </button>
          <button class="tool-button shape-tool" data-shape="unknown" title="Unknown / diamond (U)" aria-label="Unknown / diamond">
            <span class="person-icon unknown-icon" aria-hidden="true"></span>
            <kbd>U</kbd>
          </button>
          <button class="tool-button square-button trait-tool" data-trait="clear" title="Clear trait (0)" aria-label="Clear trait">
            <span class="trait-swatch trait-clear" aria-hidden="true"></span>
            <kbd>0</kbd>
          </button>
          <button class="tool-button square-button trait-tool" id="affectedBtn" data-trait="affected" title="Affected gray (A)" aria-label="Affected gray">
            <span class="trait-swatch trait-affected" aria-hidden="true"></span>
            <kbd>A</kbd>
          </button>
          <button class="tool-button square-button trait-tool" data-trait="red" title="Disease red (R)" aria-label="Disease red">
            <span class="trait-swatch trait-red" aria-hidden="true"></span>
            <kbd>R</kbd>
          </button>
          <button class="tool-button square-button trait-tool" data-trait="blue" title="Disease blue (B)" aria-label="Disease blue">
            <span class="trait-swatch trait-blue" aria-hidden="true"></span>
            <kbd>B</kbd>
          </button>
          <button class="tool-button square-button trait-tool" data-trait="green" title="Disease green (G)" aria-label="Disease green">
            <span class="trait-swatch trait-green" aria-hidden="true"></span>
            <kbd>G</kbd>
          </button>
          <button class="tool-button square-button trait-tool" data-trait="carrier" title="Carrier half fill (H)" aria-label="Carrier half fill">
            <span class="trait-swatch trait-carrier" aria-hidden="true"></span>
            <kbd>H</kbd>
          </button>
          <button class="tool-button square-button trait-tool" data-cross-toggle title="Cross mark (X)" aria-label="Cross mark">
            <span class="cross-swatch" aria-hidden="true"></span>
            <kbd>X</kbd>
          </button>
          <button class="tool-button square-button trait-tool" data-bar-toggle title="Horizontal mark (T)" aria-label="Horizontal mark">
            <span class="bar-swatch" aria-hidden="true"></span>
            <kbd>T</kbd>
          </button>
        </div>

        <div class="toolbar command-toolbar" aria-label="Fast pedigree commands">
          <button class="command-button" id="coupleBtn" title="Create/connect couple (P)">Couple</button>
          <button class="command-button" id="childBtn" title="Add child (C)">Child</button>
          <button class="command-button" id="siblingBtn" title="Add sibling (S)">Sibling</button>
          <button class="command-button" id="parentsBtn" title="Add parents above selected person">Parents</button>
        </div>

        <div class="toolbar end-toolbar" aria-label="Document controls">
          <button class="tool-button square-button" id="undoBtn" title="Undo" aria-label="Undo">↶</button>
          <button class="tool-button square-button" id="redoBtn" title="Redo" aria-label="Redo">↷</button>
          <button class="tool-button square-button" id="zoomOutBtn" title="Zoom out" aria-label="Zoom out">−</button>
          <span class="zoom-label" id="zoomLabel">100%</span>
          <button class="tool-button square-button" id="zoomInBtn" title="Zoom in" aria-label="Zoom in">+</button>
          <button class="tool-button square-button" id="keysBtn" title="Keyboard map" aria-label="Keyboard map">⌘</button>
        </div>
      </header>

      <section class="workspace-shell">
        <aside class="side-panel" aria-label="Insert and export controls">
          <section class="panel-section">
            <h2>Insert</h2>
            <div class="stack">
              <button class="wide-button" id="templateCoupleBtn">Couple</button>
              <button class="wide-button" id="templateNuclearBtn">Parents + 2</button>
              <button class="wide-button" id="templateThreeGenBtn">3 Gen</button>
              <button class="wide-button" id="labelBtn">Label</button>
            </div>
          </section>

          <section class="panel-section">
            <h2>Traits</h2>
            <div class="trait-grid">
              <button class="trait-choice" data-trait="clear">
                <span class="trait-swatch trait-clear" aria-hidden="true"></span>
                <span>Clear</span>
                <kbd>0</kbd>
              </button>
              <button class="trait-choice" data-trait="affected">
                <span class="trait-swatch trait-affected" aria-hidden="true"></span>
                <span>Gray</span>
                <kbd>A</kbd>
              </button>
              <button class="trait-choice" data-trait="red">
                <span class="trait-swatch trait-red" aria-hidden="true"></span>
                <span>Red</span>
                <kbd>R</kbd>
              </button>
              <button class="trait-choice" data-trait="blue">
                <span class="trait-swatch trait-blue" aria-hidden="true"></span>
                <span>Blue</span>
                <kbd>B</kbd>
              </button>
              <button class="trait-choice" data-trait="green">
                <span class="trait-swatch trait-green" aria-hidden="true"></span>
                <span>Green</span>
                <kbd>G</kbd>
              </button>
              <button class="trait-choice" data-trait="carrier">
                <span class="trait-swatch trait-carrier" aria-hidden="true"></span>
                <span>Half</span>
                <kbd>H</kbd>
              </button>
              <button class="trait-choice" data-cross-toggle>
                <span class="cross-swatch" aria-hidden="true"></span>
                <span>Cross</span>
                <kbd>X</kbd>
              </button>
              <button class="trait-choice" data-bar-toggle>
                <span class="bar-swatch" aria-hidden="true"></span>
                <span>Bar</span>
                <kbd>T</kbd>
              </button>
            </div>
          </section>

          <section class="panel-section">
            <h2>View</h2>
            <div class="switch-row">
              <button class="toggle-button is-on" id="snapBtn" aria-pressed="true">Snap</button>
              <button class="toggle-button is-on" id="gridBtn" aria-pressed="true">Grid</button>
            </div>
            <button class="toggle-button wide-toggle is-on" id="generationBtn" aria-pressed="true">I / II / III</button>
            <button class="wide-button" id="alignBtn">Align</button>
          </section>

          <section class="panel-section">
            <h2>Reference</h2>
            <label class="wide-button file-button" for="referenceInput">Image</label>
            <input id="referenceInput" type="file" accept="image/*" hidden />
            <label class="range-label" for="refOpacity">Opacity</label>
            <input id="refOpacity" type="range" min="0" max="1" step="0.05" value="0.35" />
            <button class="wide-button ghost-button" id="clearReferenceBtn">Clear</button>
          </section>

          <section class="panel-section">
            <h2>Output</h2>
            <div class="stack">
              <button class="wide-button" id="pngBtn">PNG</button>
              <button class="wide-button" id="svgBtn">SVG</button>
              <button class="wide-button" id="jsonBtn">Save</button>
              <label class="wide-button file-button" for="jsonInput">Load</label>
              <input id="jsonInput" type="file" accept="application/json,.json" hidden />
              <button class="wide-button ghost-button" id="printBtn">Print</button>
              <button class="wide-button danger-button" id="clearBtn">Clear</button>
            </div>
          </section>

          <section class="panel-section timer-section">
            <h2>Timer</h2>
            <div class="timer">
              <span id="timerText">00:00</span>
              <button class="tool-button square-button" id="timerBtn" title="Start / pause" aria-label="Start / pause">▶</button>
              <button class="tool-button square-button" id="timerResetBtn" title="Reset timer" aria-label="Reset timer">↺</button>
            </div>
          </section>
        </aside>

        <div class="stage-wrap" id="stageWrap">
          <svg id="stage" width="1800" height="2400" viewBox="0 0 1800 2400" role="img" aria-label="Pedigree drawing canvas">
            <defs>
              <pattern id="minorGrid" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8edf2" stroke-width="1" />
              </pattern>
              <pattern id="majorGrid" width="100" height="100" patternUnits="userSpaceOnUse">
                <rect width="100" height="100" fill="url(#minorGrid)" />
                <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#d8e0e8" stroke-width="1.4" />
              </pattern>
              <filter id="shapeShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#17202a" flood-opacity="0.18" />
              </filter>
            </defs>
            <g id="referenceLayer"></g>
            <g id="gridLayer">
              <rect x="0" y="0" width="1800" height="2400" fill="url(#majorGrid)" />
            </g>
            <g id="lineLayer"></g>
            <g id="nodeLayer"></g>
            <g id="generationLayer"></g>
            <g id="selectionLayer"></g>
          </svg>
        </div>
      </section>

      <dialog id="keysDialog" class="keys-dialog">
        <div class="dialog-head">
          <h2>Keys</h2>
          <form method="dialog">
            <button class="tool-button square-button" aria-label="Close">×</button>
          </form>
        </div>
        <div class="key-grid">
          <kbd>F</kbd><span>circle</span>
          <kbd>M</kbd><span>square</span>
          <kbd>U</kbd><span>diamond</span>
          <kbd>V</kbd><span>select</span>
          <kbd>L</kbd><span>label</span>
          <kbd>0</kbd><span>clear</span>
          <kbd>A</kbd><span>gray trait</span>
          <kbd>R</kbd><span>red trait</span>
          <kbd>B</kbd><span>blue trait</span>
          <kbd>G</kbd><span>green trait</span>
          <kbd>H</kbd><span>half fill</span>
          <kbd>X</kbd><span>cross</span>
          <kbd>T</kbd><span>bar</span>
          <kbd>P</kbd><span>couple</span>
          <kbd>C</kbd><span>child</span>
          <kbd>S</kbd><span>sibling</span>
          <kbd>⌫</kbd><span>delete</span>
          <kbd>⌘ Z</kbd><span>undo</span>
          <kbd>⇧ ↑</kbd><span>big move</span>
        </div>
      </dialog>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
